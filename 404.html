<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <script>
    // GitHub Pages: redirect any 404 to the main page (handles /repo-name/anything)
    var base = location.pathname.replace(/\/[^/]*$/, '') || '/';
    location.replace(base + (base.endsWith('/') ? '' : '/') + 'index.html');
  </script>
  <meta http-equiv="refresh" content="0;url=index.html">
  <link rel="canonical" href="index.html">
</head>
<body>
  <p>Redirecting to <a href="index.html">Alpine ski trip planner</a>…</p>
</body>
</html>
